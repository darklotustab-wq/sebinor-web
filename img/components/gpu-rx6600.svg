<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0800"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- PCB de la GPU -->
  <rect x="30" y="80" width="340" height="120" rx="6" fill="#1a3a1a" stroke="#2a5a2a" stroke-width="1.5"/>
  <!-- Cooler/ventiladores -->
  <rect x="40" y="70" width="150" height="140" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <rect x="210" y="70" width="150" height="140" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <!-- Fan izquierdo -->
  <circle cx="115" cy="140" r="55" fill="#111" stroke="#222" stroke-width="2"/>
  <circle cx="115" cy="140" r="45" fill="none" stroke="#FF6B00" stroke-width="1" opacity="0.3"/>
  <circle cx="115" cy="140" r="10" fill="#222" stroke="#FF6B00" stroke-width="1.5"/>
  <line x1="115" y1="140" x2="155" y2="140" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="115" y1="140" x2="143" y2="168" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="115" y1="140" x2="115" y2="179" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="115" y1="140" x2="86" y2="168" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="115" y1="140" x2="75" y2="140" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="115" y1="140" x2="86" y2="111" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="115" y1="140" x2="114" y2="100" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="115" y1="140" x2="143" y2="111" stroke="#FF6B00" stroke-width="3" opacity="0.6"/>
  <!-- Fan derecho -->
  <circle cx="285" cy="140" r="55" fill="#111" stroke="#222" stroke-width="2"/>
  <circle cx="285" cy="140" r="45" fill="none" stroke="#FF6B00" stroke-width="1" opacity="0.3"/>
  <circle cx="285" cy="140" r="10" fill="#222" stroke="#FF6B00" stroke-width="1.5"/>
  <line x1="285" y1="140" x2="325" y2="140" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="285" y1="140" x2="313" y2="168" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="285" y1="140" x2="285" y2="179" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="285" y1="140" x2="256" y2="168" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="285" y1="140" x2="245" y2="140" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="285" y1="140" x2="256" y2="111" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="285" y1="140" x2="284" y2="100" stroke="#FF6B00" stroke-width="3" opacity="0.6"/><line x1="285" y1="140" x2="313" y2="111" stroke="#FF6B00" stroke-width="3" opacity="0.6"/>
  <!-- Conectores en el backplate -->
  <rect x="355" y="95" width="20" height="15" rx="2" fill="#333" stroke="#555"/>
  <rect x="355" y="115" width="20" height="15" rx="2" fill="#333" stroke="#555"/>
  <rect x="355" y="135" width="20" height="25" rx="2" fill="#333" stroke="#555"/>
