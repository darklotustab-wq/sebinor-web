  <rect x="0" y="0" width="400" height="6" fill="#FF6B00"/>
  <rect x="0" y="294" width="400" height="6" fill="#FF6B00"/>
  <!-- Texto -->
  <text x="200" y="240" font-family="Arial Black" font-size="18" font-weight="900" fill="#ffffff" text-anchor="middle">RX 6600 8GB</text>
  <text x="200" y="262" font-family="Arial" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.7">GDDR6 · FidelityFX · 1080p</text>
  <text x="200" y="280" font-family="Arial" font-size="10" fill="#FF6B00" text-anchor="middle" font-weight="bold">AMD</text>
