<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0a0a0a"/>
  <!-- Torre PC -->
  <rect x="130" y="30" width="140" height="210" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  <!-- Panel vidrio templado -->
  <rect x="135" y="35" width="130" height="200" rx="6" fill="#0a1a2a" opacity="0.7" stroke="#00D4FF" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Componentes internos visibles -->
  <rect x="145" y="45" width="110" height="70" rx="4" fill="#0d2b12" opacity="0.8"/>
  <rect x="150" y="52" width="10" height="18" rx="1" fill="#111" stroke="#333"/><rect x="163" y="52" width="10" height="18" rx="1" fill="#111" stroke="#333"/><rect x="176" y="52" width="10" height="18" rx="1" fill="#111" stroke="#333"/><rect x="189" y="52" width="10" height="18" rx="1" fill="#111" stroke="#333"/><rect x="202" y="52" width="10" height="18" rx="1" fill="#111" stroke="#333"/><rect x="215" y="52" width="10" height="18" rx="1" fill="#111" stroke="#333"/><rect x="228" y="52" width="10" height="18" rx="1" fill="#111" stroke="#333"/>
  <!-- Ventiladores con RGB -->
  <circle cx="200" cy="155" r="35" fill="#0a0a1a" stroke="#222" stroke-width="2"/>
  <circle cx="200" cy="155" r="28" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="155" r="8" fill="#111" stroke="#00D4FF" stroke-width="1"/>
  <!-- Frente de la torre -->
  <rect x="130" y="30" width="20" height="210" rx="4" fill="#222"/>
  <rect x="137" y="60" width="6" height="30" rx="2" fill="#00D4FF" opacity="0.6"/>
  <circle cx="140" cy="110" r="5" fill="#00D4FF" opacity="0.8"/>
  <!-- Texto -->
  <rect x="0" y="0" width="400" height="5" fill="#00D4FF"/>
  <text x="200" y="265" font-family="Arial Black" font-size="16" fill="#fff" text-anchor="middle">Cylon 3 RGB</text>
  <text x="200" y="283" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">ATX · Panel Vidrio · RGB</text>
  <text x="200" y="297" font-family="Arial" font-size="9" fill="#00D4FF" text-anchor="middle" font-weight="bold">Aerocool</text>
</svg>