<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0a0a0a"/>
  <!-- Pantalla -->
  <rect x="50" y="20" width="300" height="190" rx="8" fill="#111" stroke="#333" stroke-width="2"/>
  <rect x="56" y="26" width="288" height="178" rx="5" fill="#050510"/>
  <!-- Contenido en pantalla simulado -->
  <rect x="60" y="30" width="280" height="170" fill="url(#screen)"/>
  <defs>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a20"/>
      <stop offset="50%" style="stop-color:#0a1530"/>
      <stop offset="100%" style="stop-color:#050a20"/>
    </linearGradient>
  </defs>
  <!-- Elementos en pantalla -->
  <text x="200" y="120" font-family="Arial Black" font-size="28" fill="#1428A0" text-anchor="middle" opacity="0.3">●</text>
  <rect x="70" y="40" width="260" height="3" rx="1" fill="#1428A0" opacity="0.15"/>
  <!-- LED RGB inferior del monitor -->
  <rect x="56" y="196" width="288" height="3" rx="1" fill="#1428A0" opacity="0.7"/>
  <!-- Base -->
  <rect x="185" y="210" width="30" height="40" rx="2" fill="#222"/>
  <rect x="150" y="248" width="100" height="10" rx="3" fill="#222" stroke="#333"/>
  <!-- Franja acento color -->
  <rect x="0" y="0" width="400" height="5" fill="#1428A0"/>
  <text x="200" y="280" font-family="Arial Black" font-size="15" fill="#fff" text-anchor="middle">Odyssey G5 27"</text>
  <text x="200" y="296" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">QHD 1440p · IPS · 180Hz</text>
</svg>